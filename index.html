        }
        .stat-box.highlight .stat-label { color: rgba(255,255,255,0.6); }

          font-family: 'Playfair Display', serif;

        }

        .stat-sub { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
        .stat-box.highlight .stat-sub { color: rgba(255,255,255,0.45); }

        /* Waterfall */

        .wf-row {

        }
        .wf-row:last-child { border-bottom: none; }
        .wf-row.total {
          font-weight: 700; padding-top: 10px; margin-top: 2px;
          border-top: 2px solid var(--rule); border-bottom: none;
        }
        .wf-label { color: var(--navy); }
        .wf-note { font-size: 0.74rem; color: var(--muted); margin-left: 6px; }
        .wf-value { font-weight: 600; color: var(--navy); font-variant-numeric: tabular-nums; }
        .wf-value.deduct { color: var(--green); }
        .wf-value.zero { color: #bbb; }

        /* Conversion spotlight */
        .conversion-box {
          background: var(--navy); border-radius: 10px;
          padding: 24px; color: #fff; margin-top: 20px;
          display: flex; align-items: center; gap: 24px;
          flex-wrap: wrap;
        }
        .conversion-icon { font-size: 2.5rem; }
        .conversion-main { flex: 1 1 180px; }
        .conversion-main h3 {
          font-family: 'Playfair Display', serif;
          font-size: 1rem; color: rgba(255,255,255,0.7); margin-bottom: 4px;
        }
        .conversion-amount {
          font-family: 'Playfair Display', serif;
          font-size: 2.4rem; font-weight: 700; color: var(--gold2);
          line-height: 1;
        }
        .conversion-sub { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 6px; }
        .conversion-details { flex: 1 1 200px; }
        .cd-row { display: flex; justify-content: space-between; font-size: 0.84rem;
          padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .cd-row:last-child { border-bottom: none; }
        .cd-label { color: rgba(255,255,255,0.6); }
        .cd-value { color: #fff; font-weight: 600; }
        .cd-value.gold { color: var(--gold2); }

        /* Save / Load bar */
        .savebar {
          background: var(--navy2); border-radius: 8px; padding: 12px 16px;
          display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
          margin-bottom: 4px; position: relative;

        .savebar-label { font-size: 0.73rem; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.5); white-space: nowrap; }
        .savebar input {
          flex: 1 1 140px; padding: 6px 10px; border-radius: 5px; font-size: 0.85rem;
          border: 1.5px solid rgba(201,168,76,0.35); background: rgba(255,255,255,0.07);
          color: #fff; font-family: inherit; outline: none; min-width: 0;

        .savebar input::placeholder { color: rgba(255,255,255,0.3); }
        .savebar input:focus { border-color: var(--gold); background: rgba(255,255,255,0.12); }
        .savebar-btn {
          padding: 6px 14px; border-radius: 5px; font-size: 0.82rem; font-weight: 600;
          cursor: pointer; font-family: inherit; border: none; transition: all 0.15s; white-space: nowrap;

        .savebar-btn.primary { background: var(--gold); color: var(--navy); }

        .savebar-btn.secondary { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); border: 1.5px solid rgba(255,255,255,0.15); }

        .save-msg {

          background: #1a2d50; border: 1px solid rgba(201,168,76,0.3); border-radius: 8px;

        .load-item-del { color: rgba(255,120,120,0.7); font-size: 0.78rem; padding: 2px 8px; border-radius: 4px; border: 1px solid rgba(255,100,100,0.2); background: transparent; cursor: pointer; font-family: inherit; }

        .combined-banner {

          align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
